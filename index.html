<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拼图小游戏 v2.2 智能边框高清版</title>
    <style>
        :root {
            --primary: #007aff;
            --success: #1d7a2a;
            --bg: #f5f5f7;
            --white: #ffffff;
            --footer-h: 80px;
        }

        /* 视口锁定：100dvh 解决移动端工具栏遮挡问题 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100dvh; 
            overflow: hidden;
            background-color: var(--bg);
            font-family: -apple-system, system-ui, sans-serif;
            touch-action: none; 
        }

        /* Flex 垂直布局容器 */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        /* 顶部标题与控制区 */
        #ui-header {
            flex-shrink: 0;
            padding: 10px 0 5px;
            text-align: center;
            background: var(--bg);
            z-index: 10;
        }
        h2 { margin: 0 0 8px; font-size: 1.1rem; color: #333; }

        .btn-group { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        
        button, select {
            padding: 8px 14px; font-size: 14px; border-radius: 8px;
            border: 1px solid #ccc; background: var(--white); cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { background: #ebebeb; transform: scale(0.95); }
        
        #origin-btn { display: none; background: var(--primary); color: white; border: none; }

        /* 核心游戏区：自动挤压逻辑 */
        #game-container {
            flex: 1; /* 占据剩余所有空间 */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            min-height: 0; /* 允许 Flex 项目在空间不足时缩小 */
            overflow: hidden;
        }

        /* Canvas 高清显示设置 */
        canvas {
            background-color: #fff;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        /* 底部成功区：固定高度且优先级高 */
        #success-footer {
            height: var(--footer-h);
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            z-index: 10;
        }

        #success-text {
            font-size: 32px;
            font-weight: bold;
            color: var(--success);
            visibility: hidden; /* 使用 visibility 避免重排 */
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #success-text.show { visibility: visible; transform: translateY(0); }

        /* 原图预览遮罩 */
        #mask {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            justify-content: center; align-items: center;
        }
        #mask img { max-width: 90%; max-height: 80%; border: 2px solid white; object-fit: contain; }
        #close-mask {
            position: absolute; top: 30px; right: 30px;
            width: 40px; height: 40px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: #000; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="ui-header">
        <h2>拼图小游戏，版本 2.2</h2>
        <div class="btn-group">
            <input type="file" id="img-input" accept="image/*" style="display:none">
            <button onclick="document.getElementById('img-input').click()">选择图片</button>
            <button id="origin-btn" onclick="toggleMask(true)">显示原图</button>
        </div>
        <div class="btn-group">
            <select id="diff-select">
                <option value="3">3 × 3</option>
                <option value="5">5 × 5</option>
                <option value="8">8 × 8</option>
            </select>
            <button onclick="initGame(true)">开始游戏</button>
            <button onclick="initGame(true)">重新开始</button>
        </div>
    </div>

    <div id="game-container">
        <canvas id="puzzleCanvas"></canvas>
    </div>

    <div id="success-footer">
        <div id="success-text">拼图成功</div>
    </div>
</div>

<div id="mask">
    <div id="close-mask" onclick="toggleMask(false)">×</div>
    <img id="mask-img" src="" alt="原图预览">
</div>

<script>
    const canvas = document.getElementById('puzzleCanvas');
    const ctx = canvas.getContext('2d');
    const imgInput = document.getElementById('img-input');
    const originBtn = document.getElementById('origin-btn');
    const successText = document.getElementById('success-text');
    const diffSelect = document.getElementById('diff-select');
    const maskImg = document.getElementById('mask-img');

    let img = new Image();
    let pieces = [];
    let size = 3;
    let lW, lH; // 逻辑宽高
    let dpr = window.devicePixelRatio || 1; // 设备像素比
    
    let dragItem = null;
    let isDragging = false;
    let mousePos = { x: 0, y: 0 };
    let hoverIdx = -1;
    let confetti = [];
    let isWon = false;

    // 1. 高清重置与比例适配算法
    imgInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            img.onload = () => {
                originBtn.style.display = 'block';
                maskImg.src = img.src;
                initGame();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    function adaptiveResize() {
        if (!img.src) return;
        
        // 获取容器实时尺寸
        const container = document.getElementById('game-container');
        const maxW = container.clientWidth - 20; // 留出一点边距
        const maxH = container.clientHeight - 20;

        const imgRatio = img.width / img.height;

        lW = maxW;
        lH = lW / imgRatio;

        // 核心挤压：如果高度溢出容器，则反向以高度为基准
        if (lH > maxH) {
            lH = maxH;
            lW = lH * imgRatio;
        }

        // 高清化设置核心
        // 1. 设置 Canvas 物理分辨率（缓冲区尺寸）
        canvas.width = lW * dpr;
        canvas.height = lH * dpr;
        // 2. 设置 Canvas 显示尺寸（CSS 尺寸）
        canvas.style.width = lW + 'px';
        canvas.style.height = lH + 'px';

        // 设置全局渲染平滑度
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        
        // 3. 核心：缩放上下文，使后续绘图指令仍使用逻辑像素坐标
        ctx.resetTransform();
        ctx.scale(dpr, dpr);
    }

    // 监听窗口变化，实时修正（应对手机工具栏伸缩）
    window.addEventListener('resize', () => {
        if (img.src) {
            adaptiveResize();
            render();
        }
    });

    function toggleMask(show) { document.getElementById('mask').style.display = show ? 'flex' : 'none'; }

    // 2. 游戏核心逻辑
    function initGame() {
        if (!img.src) return;
        isWon = false;
        successText.classList.remove('show');
        confetti = [];
        size = parseInt(diffSelect.value);
        
        adaptiveResize();

        pieces = [];
        for (let i = 0; i < size * size; i++) {
            pieces.push({ orig: i, curr: i, locked: false });
        }

        // 打乱顺序，确保不立即获胜
        do {
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i].curr, pieces[j].curr] = [pieces[j].curr, pieces[i].curr];
            }
        } while (checkWin());

        updateGameStatus();
        requestAnimationFrame(mainLoop);
    }

    function checkWin() {
        return pieces.every(p => p.curr === p.orig);
    }

    function updateGameStatus() {
        let winCount = 0;
        pieces.forEach(p => {
            if (p.curr === p.orig) {
                p.locked = true;
                winCount++;
            } else {
                p.locked = false;
            }
        });
        
        if (winCount === size * size && pieces.length > 0 && !isWon) {
            isWon = true;
            successText.classList.add('show');
            spawnConfetti();
        }
    }

    // 3. 交互逻辑（增强型拖拽与触摸适配）
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        // 兼容触摸和鼠标事件，直接返回相对于 Canvas 逻辑像素的坐标
        const t = e.touches ? e.touches[0] : e;
        return { 
            x: t.clientX - rect.left, 
            y: t.clientY - rect.top 
        };
    }

    canvas.addEventListener('mousedown', startAction);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(e); }, { passive: false });

    function startAction(e) {
        if (isWon) return;
        const pos = getCoords(e);
        const cw = lW / size, ch = lH / size; // 逻辑像素下的碎片宽高
        const idx = Math.floor(pos.y / ch) * size + Math.floor(pos.x / cw);
        const piece = pieces.find(p => p.curr === idx);
        
        if (piece && !piece.locked) {
            dragItem = piece;
            isDragging = true;
            mousePos = pos;
        }
    }

    window.addEventListener('mousemove', moveAction);
    window.addEventListener('touchmove', (e) => { if(isDragging) e.preventDefault(); moveAction(e); }, { passive: false });

    function moveAction(e) {
        if (!isDragging) return;
        mousePos = getCoords(e);
        const cw = lW / size, ch = lH / size;
        const col = Math.floor(mousePos.x / cw), row = Math.floor(mousePos.y / ch);
        hoverIdx = (col >= 0 && col < size && row >= 0 && row < size) ? row * size + col : -1;
    }

    window.addEventListener('mouseup', endAction);
    window.addEventListener('touchend', endAction);

    function handleEnd() {
        if (!isDragging) return;
        if (hoverIdx !== -1) {
            const target = pieces.find(p => p.curr === hoverIdx);
            // 锁定规则：目标碎片必须存在且未被锁定
            if (target && !target.locked && target !== dragItem) {
                const temp = dragItem.curr;
                dragItem.curr = target.curr;
                target.curr = temp;
            }
        }
        dragItem = null; isDragging = false; hoverIdx = -1;
        updateGameStatus();
    }

    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchend', endAction); // 触摸结束使用 endAction，统一清理逻辑

    function endAction() {
        if (!isDragging) return;
        if (hoverIdx !== -1) {
            const target = pieces.find(p => p.curr === hoverIdx);
            // 锁定规则：目标碎片必须存在且未被锁定
            if (target && !target.locked && target !== dragItem) {
                const temp = dragItem.curr;
                dragItem.curr = target.curr;
                target.curr = temp;
            }
        }
        dragItem = null; isDragging = false; hoverIdx = -1;
        updateGameStatus();
    }

    // 4. 绘图引擎与智能边框算法 (v2.2 核心)
    function mainLoop() {
        render();
        requestAnimationFrame(mainLoop);
    }

    function render() {
        ctx.clearRect(0, 0, lW, lH); // 在逻辑坐标系下清空
        const cw = lW / size, ch = lH / size;

        // 绘制底层拼图（未被拖拽的）
        pieces.forEach(p => {
            if (p !== dragItem) drawPiece(p, cw, ch);
        });

        // 目标高亮
        if (isDragging && hoverIdx !== -1) {
            const hoverPiece = pieces.find(p => p.curr === hoverIdx);
            if (hoverPiece && !hoverPiece.locked) {
                ctx.save();
                ctx.strokeStyle = "rgba(0, 122, 255, 0.8)";
                ctx.lineWidth = 4;
                ctx.strokeRect((hoverIdx % size) * cw + 2, Math.floor(hoverIdx / size) * ch + 2, cw - 4, ch - 4);
                ctx.restore();
            }
        }

        // 绘制拖拽块层（置顶且有阴影）
        if (dragItem) {
            ctx.save();
            ctx.shadowBlur = 20; ctx.shadowColor = "rgba(0,0,0,0.4)";
            ctx.globalAlpha = 0.85;
            // 绘制拖拽块内容
            const sw = img.width / size, sh = img.height / size;
            const sx = (dragItem.orig % size) * sw, sy = Math.floor(dragItem.orig / size) * sh;
            // 此时 mousePos 是相对于 Canvas 的逻辑像素坐标，我们将碎片中心对准手指
            ctx.drawImage(img, sx, sy, sw, sh, mousePos.x - cw/2, mousePos.y - ch/2, cw, ch);
            // 拖拽块使用白色细边框区分
            ctx.strokeStyle = "white"; ctx.lineWidth = 1;
            ctx.strokeRect(mousePos.x - cw/2, mousePos.y - ch/2, cw, ch);
            ctx.restore();
        }

        // 绘制五彩纸屑
        if (confetti.length > 0) {
            confetti.forEach((c, i) => {
                c.y += c.vy; c.x += Math.cos(c.a) * 2;
                ctx.fillStyle = c.color;
                ctx.beginPath(); ctx.arc(c.x, c.y, c.s, 0, Math.PI * 2); ctx.fill();
                if (c.y > lH) confetti.splice(i, 1);
            });
        }
    }

    // 智能邻域路径检测绘制 (N-Piece Grouping Logic)
    function drawPiece(p, cw, ch) {
        const x = (p.curr % size) * cw, y = Math.floor(p.curr / size) * ch;
        const sw = img.width / size, sh = img.height / size;
        const sx = (p.orig % size) * sw, sy = Math.floor(p.orig / size) * sh;

        // 1. 绘制图片（在逻辑坐标系下）
        ctx.drawImage(img, sx, sy, sw, sh, x, y, cw, ch);

        // 2. 边框绘制
        if (p.locked) {
            ctx.save();
            ctx.strokeStyle = "lime"; // 正确位置绿色
            ctx.lineWidth = 4; // 加粗绿色
            ctx.beginPath();

            const row = Math.floor(p.curr / size), col = p.curr % size;

            // N-Piece Grouping Core Algorithm: 检测上相邻碎片
            let upLocked = false;
            if (row > 0) {
                // 在 pieces 数组中查找当前位于上方网格的碎片
                const upPiece = pieces.find(item => item.curr === p.curr - size);
                if (upPiece && upPiece.locked) upLocked = true;
            }
            if (!upLocked) {
                // 如果上方没被绿色锁定块占领，绘制顶边线
                ctx.moveTo(x, y);
                ctx.lineTo(x + cw, y);
            }

            // 下检测
            let downLocked = false;
            if (row < size - 1) {
                const downPiece = pieces.find(item => item.curr === p.curr + size);
                if (downPiece && downPiece.locked) downLocked = true;
            }
            if (!downLocked) { ctx.moveTo(x, y + ch); ctx.lineTo(x + cw, y + ch); }

            // 左检测
            let leftLocked = false;
            if (col > 0) {
                const leftPiece = pieces.find(item => item.curr === p.curr - 1);
                if (leftPiece && leftPiece.locked) leftLocked = true;
            }
            if (!leftLocked) { ctx.moveTo(x, y); ctx.lineTo(x, y + ch); }

            // 右检测
            let rightLocked = false;
            if (col < size - 1) {
                const rightPiece = pieces.find(item => item.curr === p.curr + 1);
                if (rightPiece && rightPiece.locked) rightLocked = true;
            }
            if (!rightLocked) { ctx.moveTo(x + cw, y); ctx.lineTo(x + cw, y + ch); }

            ctx.stroke(); // 绘制路径，确保连通的块外框一气呵成
            ctx.restore();
        } else {
            // 未锁定的普通碎片，白色 1px 细边框线
            ctx.strokeStyle = "white"; ctx.lineWidth = 1; ctx.strokeRect(x, y, cw, ch);
        }
    }

    function spawnConfetti() {
        const colors = ['#f00', '#0f0', '#00f', '#ff0', '#0ff', '#f0f'];
        for (let i = 0; i < 150; i++) {
            confetti.push({
                x: Math.random() * lW, y: -20, s: Math.random() * 4 + 2,
                color: colors[Math.floor(Math.random() * colors.length)],
                vy: Math.random() * 3 + 2, a: Math.random() * 2 * Math.PI
            });
        }
    }
</script>
</body>
</html>
