<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自适应拼图游戏</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding: 20px; touch-action: manipulation; }
        .controls { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #puzzle-board { 
            display: grid; gap: 2px; margin: 0 auto; background: #ccc; 
            max-width: 90vw; max-height: 70vh; width: fit-content;
        }
        .tile { 
            background-size: cover; cursor: pointer; user-select: none;
            box-sizing: border-box; border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.1s;
        }
        .tile.selected { border: 3px solid #ff4757; transform: scale(0.95); z-index: 10; }
        .tile.locked { cursor: default; filter: grayscale(0.5); opacity: 0.9; border: none; }
        .hidden { display: none; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <select id="difficulty">
            <option value="3">3 x 3</option>
            <option value="5">5 x 5</option>
            <option value="8">8 x 8</option>
        </select>
        <button onclick="startGame()">开始游戏</button>
    </div>

    <div id="puzzle-board"></div>

    <script>
        let gridSize = 3;
        let tiles = [];
        let selectedTile = null;
        let originalImg = new Image();
        const board = document.getElementById('puzzle-board');

        // 选择图片加载
        document.getElementById('imageInput').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                originalImg.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        function startGame() {
            if (!originalImg.src) return alert("请先选择一张图片！");
            gridSize = parseInt(document.getElementById('difficulty').value);
            initPuzzle();
        }

        function initPuzzle() {
            board.innerHTML = '';
            tiles = [];
            const size = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.7);
            const tileSize = size / gridSize;

            board.style.gridTemplateColumns = `repeat(${gridSize}, ${tileSize}px)`;

            // 创建打乱的索引数组，排除已经在正确位置的可能性（可选，此处完全随机）
            let indices = Array.from({length: gridSize * gridSize}, (_, i) => i);
            indices = indices.sort(() => Math.random() - 0.5);

            for (let i = 0; i < gridSize * gridSize; i++) {
                const correctPos = i;
                const currentPos = indices[i];
                
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.style.width = `${tileSize}px`;
                tile.style.height = `${tileSize}px`;
                tile.dataset.correctIndex = correctPos;
                tile.dataset.currentIndex = currentPos;

                // 绘制切片
                updateTileDisplay(tile, currentPos);
                
                // 绑定事件（兼容点击和拖拽起点）
                tile.addEventListener('mousedown', handleStart);
                tile.addEventListener('touchstart', handleStart, {passive: false});
                tile.addEventListener('mouseup', handleEnd);
                tile.addEventListener('touchend', handleEnd);

                tiles.push(tile);
            }

            // 渲染到DOM
            tiles.forEach(t => board.appendChild(t));
            checkWin(); // 检查初始状态是否有锁定的
        }

        function updateTileDisplay(tile, imgIdx) {
            const row = Math.floor(imgIdx / gridSize);
            const col = imgIdx % gridSize;
            const percent = 100 / (gridSize - 1);
            
            tile.style.backgroundImage = `url(${originalImg.src})`;
            tile.style.backgroundSize = `${gridSize * 100}% ${gridSize * 100}%`;
            tile.style.backgroundPosition = `${col * percent}% ${row * percent}%`;
            
            // 锁定逻辑
            if (parseInt(tile.dataset.correctIndex) === imgIdx) {
                tile.classList.add('locked');
            } else {
                tile.classList.remove('locked');
            }
        }

        let startX, startY;

        function handleStart(e) {
            e.preventDefault();
            const tile = e.currentTarget;
            if (tile.classList.contains('locked')) return;

            if (!selectedTile) {
                // 第一步：选中
                selectedTile = tile;
                tile.classList.add('selected');
                const touch = e.touches ? e.touches[0] : e;
                startX = touch.clientX;
                startY = touch.clientY;
            } else {
                // 第二步：点击交换（针对第二种操作方式）
                swapTiles(selectedTile, tile);
            }
        }

        function handleEnd(e) {
            if (!selectedTile) return;
            
            const touch = e.changedTouches ? e.changedTouches[0] : e;
            const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);

            // 第一种操作方式：如果是拖动到另一个tile上
            if (targetEl && targetEl.classList.contains('tile') && targetEl !== selectedTile) {
                if (!targetEl.classList.contains('locked')) {
                    swapTiles(selectedTile, targetEl);
                    return;
                }
            }
            
            // 如果是原地点击，保留选中状态等待第二次点击
            const dist = Math.hypot(touch.clientX - startX, touch.clientY - startY);
            if (dist > 10) { // 明显的拖动动作但没点到目标
                selectedTile.classList.remove('selected');
                selectedTile = null;
            }
        }

        function swapTiles(tile1, tile2) {
            const idx1 = tile1.dataset.currentIndex;
            const idx2 = tile2.dataset.currentIndex;

            // 交换索引数据
            tile1.dataset.currentIndex = idx2;
            tile2.dataset.currentIndex = idx1;

            // 更新显示
            updateTileDisplay(tile1, parseInt(idx2));
            updateTileDisplay(tile2, parseInt(idx1));

            // 清除选中
            tile1.classList.remove('selected');
            selectedTile = null;

            checkWin();
        }

        function checkWin() {
            const allLocked = Array.from(document.querySelectorAll('.tile')).every(t => t.classList.contains('locked'));
            if (allLocked && tiles.length > 0) {
                setTimeout(() => alert("太棒了！拼图完成！"), 100);
            }
        }
    </script>
</body>
</html>
