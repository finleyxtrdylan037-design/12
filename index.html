<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拼图小游戏 v2.3 关卡联动版</title>
    <style>
        :root {
            --primary: #007aff;
            --success: #1d7a2a;
            --bg: #f5f5f7;
            --white: #ffffff;
            --row-h: 34px;
        }

        /* 视口锁定：100dvh 解决动态工具栏问题 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100dvh; 
            overflow: hidden;
            background-color: var(--bg);
            font-family: -apple-system, system-ui, sans-serif;
            touch-action: none; 
        }

        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%; height: 100dvh;
            padding: env(safe-area-inset-top) 5px env(safe-area-inset-bottom) 5px;
        }

        /* 顶部 UI 管理：强制压缩至三行内 */
        #header-ui { flex-shrink: 0; padding-top: 5px; }
        .ui-row { 
            display: flex; align-items: center; justify-content: space-between; 
            height: var(--row-h); margin-bottom: 4px; gap: 5px;
        }
        .title { font-size: 0.9rem; font-weight: bold; color: #333; }
        .lvl-info { font-size: 0.85rem; color: var(--primary); font-weight: bold; }

        button, select {
            padding: 4px 10px; font-size: 13px; border-radius: 6px;
            border: 1px solid #d1d1d6; background: var(--white); cursor: pointer;
            white-space: nowrap;
        }
        button:active { background: #f2f2f7; opacity: 0.8; }
        #btn-origin { background: var(--primary); color: white; border: none; visibility: hidden; }

        /* 中部游戏区：动态挤压逻辑 */
        #game-area {
            flex: 1; display: flex; justify-content: center; align-items: center;
            min-height: 0; overflow: hidden; padding: 5px;
        }
        canvas {
            background-color: #fff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        /* 底部成功区：固定 80px */
        #footer-ui {
            height: 80px; flex-shrink: 0;
            display: flex; justify-content: center; align-items: center;
        }
        #success-msg {
            font-size: 32px; font-weight: bold; color: var(--success);
            opacity: 0; transform: translateY(15px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #success-msg.show { opacity: 1; transform: translateY(0); }

        /* 原图预览遮罩 */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            justify-content: center; align-items: center;
        }
        #modal img { max-width: 90%; max-height: 80%; border: 2px solid #fff; }
        #close-modal {
            position: absolute; top: 30px; right: 20px;
            width: 36px; height: 36px; background: #fff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="header-ui">
        <div class="ui-row">
            <span class="title">拼图 v2.3</span>
            <span id="level-display" class="lvl-info">第 1/10 关</span>
            <button onclick="document.getElementById('file-in').click()">本地图片</button>
            <input type="file" id="file-in" accept="image/*" style="display:none">
        </div>
        <div class="ui-row" style="justify-content: center; gap: 15px;">
            <button id="btn-origin" onclick="toggleModal(true)">显示原图</button>
            <button id="btn-next" onclick="nextLevel()">下一关</button>
        </div>
        <div class="ui-row" style="justify-content: center; gap: 10px;">
            <select id="diff-sel">
                <option value="3">3 × 3</option>
                <option value="5">5 × 5</option>
                <option value="8">8 × 8</option>
            </select>
            <button onclick="initGame(true)" style="background:#34c759; color:white; border:none;">开始游戏</button>
            <button onclick="initGame(true)">重新开始</button>
        </div>
    </div>

    <div id="game-area">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="footer-ui">
        <div id="success-msg">拼图成功</div>
    </div>
</div>

<div id="modal">
    <div id="close-modal" onclick="toggleModal(false)">×</div>
    <img id="modal-img" src="">
</div>

<script>
    // 关卡配置
    const levels = [
        'https://picsum.photos/id/10/800/1000',
        'https://picsum.photos/id/15/800/1000',
        'https://picsum.photos/id/20/800/1000',
        'https://picsum.photos/id/25/800/1000',
        'https://picsum.photos/id/28/800/1000',
        'https://picsum.photos/id/30/800/1000',
        'https://picsum.photos/id/42/800/1000',
        'https://picsum.photos/id/48/800/1000',
        'https://picsum.photos/id/54/800/1000',
        'https://picsum.photos/id/60/800/1000'
    ];

    let curLvlIdx = 0;
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    
    let img = new Image();
    let pieces = [];
    let size = 3;
    let lW, lH; // 逻辑宽高
    let activeP = null;
    let isDragging = false;
    let pointer = { x: 0, y: 0 };
    let hoverIdx = -1;
    let confetti = [];
    let winLock = false;

    // 初始化关卡
    window.onload = () => loadLevel(0);

    function loadLevel(idx) {
        curLvlIdx = idx % levels.length;
        document.getElementById('level-display').innerText = `第 ${curLvlIdx + 1}/10 关`;
        img.crossOrigin = "Anonymous";
        img.onload = () => {
            document.getElementById('modal-img').src = img.src;
            document.getElementById('btn-origin').style.visibility = 'visible';
            initGame(true);
        };
        img.src = levels[curLvlIdx];
    }

    function nextLevel() {
        if (winLock) return;
        loadLevel(curLvlIdx + 1);
    }

    // 本地上传适配
    document.getElementById('file-in').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            img.onload = () => {
                document.getElementById('modal-img').src = img.src;
                document.getElementById('level-display').innerText = "自定义关卡";
                initGame(true);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    // 视口挤压与高清适配算法
    function syncSize() {
        const area = document.getElementById('game-area');
        const maxLW = area.clientWidth - 10;
        const maxLH = area.clientHeight - 10;
        const ratio = img.width / img.height;

        lW = maxLW; lH = lW / ratio;
        if (lH > maxLH) { lH = maxLH; lW = lH * ratio; }

        canvas.width = lW * dpr;
        canvas.height = lH * dpr;
        canvas.style.width = lW + 'px';
        canvas.style.height = lH + 'px';
        
        ctx.resetTransform();
        ctx.scale(dpr, dpr);
        ctx.imageSmoothingQuality = 'high';
    }

    function initGame(shuffle = true) {
        if (!img.src) return;
        winLock = false;
        document.getElementById('success-msg').classList.remove('show');
        confetti = [];
        size = parseInt(document.getElementById('diff-sel').value);
        syncSize();

        pieces = [];
        for (let i = 0; i < size * size; i++) {
            pieces.push({ orig: i, curr: i, locked: false });
        }

        if (shuffle) {
            do {
                for (let i = pieces.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pieces[i].curr, pieces[j].curr] = [pieces[j].curr, pieces[i].curr];
                }
            } while (checkWin());
        }
        refreshStatus();
        renderLoop();
    }

    function checkWin() { return pieces.every(p => p.curr === p.orig); }

    function refreshStatus() {
        let win = true;
        pieces.forEach(p => {
            if (p.curr === p.orig) p.locked = true;
            else { p.locked = false; win = false; }
        });
        if (win && pieces.length > 0 && !winLock) {
            winLock = true;
            document.getElementById('success-msg').classList.add('show');
            spawnConfetti();
            setTimeout(() => { if(winLock) nextLevel(); }, 3000);
        }
    }

    // 交互适配
    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    function onStart(e) {
        if (winLock) return;
        const p = getPos(e);
        const cw = lW / size, ch = lH / size;
        const idx = Math.floor(p.y / ch) * size + Math.floor(p.x / cw);
        const target = pieces.find(item => item.curr === idx);
        if (target && !target.locked) {
            activeP = target; isDragging = true; pointer = p;
        }
    }

    function onMove(e) {
        if (!isDragging) return;
        pointer = getPos(e);
        const cw = lW / size, ch = lH / size;
        const col = Math.floor(pointer.x / cw), row = Math.floor(pointer.y / ch);
        hoverIdx = (col >= 0 && col < size && row >= 0 && row < size) ? row * size + col : -1;
    }

    function onEnd() {
        if (!isDragging) return;
        if (hoverIdx !== -1) {
            const tp = pieces.find(p => p.curr === hoverIdx);
            if (tp && !tp.locked && tp !== activeP) {
                const tmp = activeP.curr;
                activeP.curr = tp.curr;
                tp.curr = tmp;
            }
        }
        activeP = null; isDragging = false; hoverIdx = -1;
        refreshStatus();
    }

    canvas.addEventListener('mousedown', onStart);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, {passive:false});
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', (e) => { if(isDragging) e.preventDefault(); onMove(e); }, {passive:false});
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchend', onEnd);

    // 智能渲染与边界合并 (v2.3 核心)
    function renderLoop() {
        ctx.clearRect(0, 0, lW, lH);
        const cw = lW / size, ch = lH / size;

        // 1. 绘制底层静态碎片
        pieces.forEach(p => {
            if (p !== activeP) drawPiece(p, cw, ch);
        });

        // 2. 目标高亮
        if (isDragging && hoverIdx !== -1) {
            const hp = pieces.find(p => p.curr === hoverIdx);
            if (hp && !hp.locked) {
                ctx.strokeStyle = "rgba(0, 122, 255, 0.8)";
                ctx.lineWidth = 4;
                ctx.strokeRect((hoverIdx % size) * cw + 2, Math.floor(hoverIdx / size) * ch + 2, cw - 4, ch - 4);
            }
        }

        // 3. 悬浮块绘制
        if (activeP) {
            ctx.save();
            ctx.shadowBlur = 15; ctx.shadowColor = "rgba(0,0,0,0.4)";
            ctx.globalAlpha = 0.85;
            const x = pointer.x - cw/2, y = pointer.y - ch/2;
            drawImgFrag(activeP, x, y, cw, ch);
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(x,y,cw,ch);
            ctx.restore();
        }

        // 4. 五彩纸屑
        if (confetti.length > 0) {
            confetti.forEach((c, i) => {
                c.y += c.v; c.x += Math.sin(c.a) * 2;
                ctx.fillStyle = c.color;
                ctx.beginPath(); ctx.arc(c.x, c.y, c.s, 0, Math.PI*2); ctx.fill();
                if (c.y > lH) confetti.splice(i, 1);
            });
        }
        requestAnimationFrame(renderLoop);
    }

    function drawPiece(p, cw, ch) {
        const x = (p.curr % size) * cw;
        const y = Math.floor(p.curr / size) * ch;
        drawImgFrag(p, x, y, cw, ch);

        if (p.locked) {
            ctx.save();
            ctx.strokeStyle = "lime"; ctx.lineWidth = 3;
            ctx.beginPath();
            const r = Math.floor(p.curr / size), c = p.curr % size;
            
            // 邻域检测合并算法
            const check = (idx) => {
                const neighbor = pieces.find(item => item.curr === idx);
                return neighbor && neighbor.locked;
            };

            if (r === 0 || !check(p.curr - size)) { ctx.moveTo(x, y); ctx.lineTo(x + cw, y); }
            if (r === size - 1 || !check(p.curr + size)) { ctx.moveTo(x, y + ch); ctx.lineTo(x + cw, y + ch); }
            if (c === 0 || !check(p.curr - 1)) { ctx.moveTo(x, y); ctx.lineTo(x, y + ch); }
            if (c === size - 1 || !check(p.curr + 1)) { ctx.moveTo(x + cw, y); ctx.lineTo(x + cw, y + ch); }
            
            ctx.stroke(); ctx.restore();
        } else {
            ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 1; ctx.strokeRect(x, y, cw, ch);
        }
    }

    function drawImgFrag(p, x, y, cw, ch) {
        const sw = img.width / size, sh = img.height / size;
        const sx = (p.orig % size) * sw, sy = Math.floor(p.orig / size) * sh;
        ctx.drawImage(img, sx, sy, sw, sh, x, y, cw, ch);
    }

    function spawnConfetti() {
        const colors = ['#ff3b30', '#4cd964', '#007aff', '#ffcc00', '#ff9500', '#5856d6'];
        for (let i = 0; i < 150; i++) {
            confetti.push({
                x: Math.random() * lW, y: -20, s: Math.random() * 4 + 2,
                color: colors[Math.floor(Math.random() * colors.length)],
                v: Math.random() * 3 + 3, a: Math.random() * 6
            });
        }
    }

    function toggleModal(val) { document.getElementById('modal').style.display = val ? 'flex' : 'none'; }
    window.addEventListener('resize', () => { if(img.src) { syncSize(); } });
</script>
</body>
</html>
