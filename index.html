<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼图小游戏 v1.5</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary-color: #007bff;
            --success-color: #28a745;
            --border-color: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            touch-action: manipulation;
        }
        h2 { margin: 10px 0; color: #333; }
        .controls { margin-bottom: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        button, label {
            padding: 8px 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        select { padding: 7px; border-radius: 5px; }
        
        /* 游戏画布 */
        #game-container {
            display: grid;
            margin: 20px auto;
            border: 2px solid #ccc;
            background: #eee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 95vw;
            max-height: 70vh;
        }
        .tile {
            box-sizing: border-box;
            border: 1.5px solid var(--border-color);
            background-repeat: no-repeat;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .tile.correct {
            border: 2px solid var(--success-color) !important;
            cursor: default;
        }
        .tile.selected {
            opacity: 0.7;
            transform: scale(0.95);
        }

        /* 原图遮罩层 */
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #overlay img { max-width: 90%; max-height: 90%; border: 3px solid white; }
        #close-overlay {
            position: absolute;
            top: 20px; right: 20px;
            background: red; color: white;
            padding: 10px 15px; border-radius: 50%;
            font-weight: bold; cursor: pointer;
        }

        #status {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--success-color);
            height: 30px;
        }
        #hidden-file { display: none; }
    </style>
</head>
<body>

    <h2>拼图小游戏 版本1.5</h2>

    <div class="controls">
        <label for="hidden-file">选择图片</label>
        <input type="file" id="hidden-file" accept="image/*">
        <button id="btn-show-origin" style="display: none; background: #6c757d;">显示原图</button>
    </div>

    <div class="controls">
        <select id="difficulty">
            <option value="3">3 * 3</option>
            <option value="5">5 * 5</option>
            <option value="8">8 * 8</option>
        </select>
        <button onclick="initGame()">开始游戏</button>
        <button onclick="initGame()" style="background: #17a2b8;">重新开始</button>
    </div>

    <div id="game-container"></div>
    <div id="status"></div>

    <div id="overlay">
        <span id="close-overlay">✕</span>
        <img id="full-image-preview" src="" alt="原图">
    </div>

    <script>
        let gridSize = 3;
        let imgUrl = "";
        let tiles = [];
        let firstSelected = null;
        let isWin = false;

        const container = document.getElementById('game-container');
        const fileInput = document.getElementById('hidden-file');
        const btnShowOrigin = document.getElementById('btn-show-origin');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status');

        // 文件选择处理
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                imgUrl = URL.createObjectURL(file);
                btnShowOrigin.style.display = "inline-block";
                document.getElementById('full-image-preview').src = imgUrl;
                initGame();
            }
        };

        // 显示/隐藏原图
        btnShowOrigin.onclick = () => overlay.style.display = "flex";
        document.getElementById('close-overlay').onclick = () => overlay.style.display = "none";

        function initGame() {
            if (!imgUrl) {
                alert("请先选择一张图片！");
                return;
            }
            gridSize = parseInt(document.getElementById('difficulty').value);
            container.innerHTML = "";
            statusText.innerText = "";
            firstSelected = null;
            isWin = false;
            
            // 计算自适应屏幕大小
            const screenWidth = window.innerWidth * 0.9;
            const size = Math.min(screenWidth, 500); 
            container.style.width = size + "px";
            container.style.height = size + "px";
            container.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            // 创建切片索引
            let indices = Array.from({length: gridSize * gridSize}, (_, i) => i);
            
            // 打乱顺序（确保不全在原位）
            let shuffledIndices;
            do {
                shuffledIndices = [...indices].sort(() => Math.random() - 0.5);
            } while (isAlreadySolved(shuffledIndices));

            tiles = [];
            shuffledIndices.forEach((pos, index) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.dataset.currentIdx = index; // 现在的格子位置
                tile.dataset.originIdx = pos;   // 图片代表的原始位置
                
                // 设置背景图及偏移 (保持比例拼图关键)
                const row = Math.floor(pos / gridSize);
                const col = pos % gridSize;
                const percent = 100 / (gridSize - 1);
                
                tile.style.backgroundImage = `url(${imgUrl})`;
                tile.style.backgroundSize = `${gridSize * 100}% ${gridSize * 100}%`;
                tile.style.backgroundPosition = `${col * percent}% ${row * percent}%`;

                // 检查初始是否就在正确位置
                if (parseInt(tile.dataset.originIdx) === parseInt(tile.dataset.currentIdx)) {
                    tile.classList.add('correct');
                }

                tile.onclick = () => handleTileClick(tile);
                container.appendChild(tile);
                tiles.push(tile);
            });
        }

        function handleTileClick(tile) {
            if (isWin || tile.classList.contains('correct')) return;

            if (!firstSelected) {
                firstSelected = tile;
                tile.classList.add('selected');
            } else {
                if (firstSelected === tile) {
                    tile.classList.remove('selected');
                    firstSelected = null;
                    return;
                }
                
                swapTiles(firstSelected, tile);
                firstSelected.classList.remove('selected');
                firstSelected = null;
                checkWin();
            }
        }

        function swapTiles(t1, t2) {
            // 交换绑定的原始索引数据
            const tempIdx = t1.dataset.originIdx;
            const tempBgPos = t1.style.backgroundPosition;

            t1.dataset.originIdx = t2.dataset.originIdx;
            t1.style.backgroundPosition = t2.style.backgroundPosition;

            t2.dataset.originIdx = tempIdx;
            t2.style.backgroundPosition = tempBgPos;

            // 检查交换后的图片是否到达正确位置
            updateCorrectStatus(t1);
            updateCorrectStatus(t2);
        }

        function updateCorrectStatus(tile) {
            if (parseInt(tile.dataset.originIdx) === parseInt(tile.dataset.currentIdx)) {
                tile.classList.add('correct');
            }
        }

        function isAlreadySolved(arr) {
            return arr.every((val, index) => val === index);
        }

        function checkWin() {
            const allTiles = document.querySelectorAll('.tile');
            const win = Array.from(allTiles).every(t => t.classList.contains('correct'));
            if (win) {
                isWin = true;
                statusText.innerText = "🎉 拼图成功！";
            }
        }
    </script>
</body>
</html>
