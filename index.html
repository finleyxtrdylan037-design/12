<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>拼图小游戏</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            touch-action: manipulation;
        }
        h2 { margin: 10px 0 5px; }
        .version { color: #666; margin-bottom: 20px; font-size: 14px; }
        
        .controls { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        
        #puzzle-board {
            display: grid;
            margin: 0 auto;
            gap: 2px;
            background-color: #ccc;
            border: 2px solid #333;
            max-width: 90vw;
            max-height: 70vh;
            position: relative;
            user-select: none;
        }

        .tile {
            background-repeat: no-repeat;
            cursor: pointer;
            box-sizing: border-box;
            touch-action: none; /* 防止移动端拖拽时页面滚动 */
        }

        .tile.correct {
            cursor: default;
            outline: 2px solid #4CAF50;
            z-index: 1;
        }

        .dragging {
            opacity: 0.6;
            transform: scale(1.05);
            z-index: 100;
        }

        #status {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
            min-height: 32px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h2>拼图小游戏</h2>
    <div class="version">版本 1.3</div>

    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        <div>
            难度：
            <select id="difficulty">
                <option value="3">3x3</option>
                <option value="5">5x5</option>
                <option value="8">8x8</option>
            </select>
            <button id="startBtn">开始游戏</button>
        </div>
    </div>

    <div id="puzzle-board"></div>
    <div id="status"></div>

    <script>
        const board = document.getElementById('puzzle-board');
        const imageInput = document.getElementById('imageInput');
        const difficultySelect = document.getElementById('difficulty');
        const startBtn = document.getElementById('startBtn');
        const statusDisplay = document.getElementById('status');

        let tiles = [];
        let originalImage = new Image();
        let gridSize = 3;
        let dragSrcEl = null;

        // 加载图片
        imageInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        startBtn.onclick = startGame;

        function startGame() {
            if (!originalImage.src) {
                alert("请先选择一张图片！");
                return;
            }
            gridSize = parseInt(difficultySelect.value);
            statusDisplay.innerText = "";
            createPuzzle();
        }

        function createPuzzle() {
            board.innerHTML = "";
            tiles = [];
            
            // 计算拼图板的显示尺寸（保持原图比例）
            const containerWidth = Math.min(window.innerWidth * 0.9, 500);
            const ratio = originalImage.height / originalImage.width;
            const boardWidth = containerWidth;
            const boardHeight = containerWidth * ratio;

            board.style.width = boardWidth + 'px';
            board.style.height = boardHeight + 'px';
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            const tileWidth = boardWidth / gridSize;
            const tileHeight = boardHeight / gridSize;

            // 生成所有切片数据
            let positions = [];
            for (let i = 0; i < gridSize * gridSize; i++) {
                positions.push(i);
            }

            // 打乱顺序，但确保初始不在正确位置
            let shuffled = [...positions].sort(() => Math.random() - 0.5);

            for (let i = 0; i < gridSize * gridSize; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                const correctPos = i;
                const currentPos = shuffled[i];

                tile.dataset.correctIndex = correctPos;
                tile.dataset.currentIndex = i; // 当前在 DOM 中的顺序
                tile.style.width = '100%';
                tile.style.height = '100%';
                
                // 设置背景图及偏移
                tile.style.backgroundImage = `url(${originalImage.src})`;
                tile.style.backgroundSize = `${boardWidth}px ${boardHeight}px`;
                
                updateTileDisplay(tile, currentPos, boardWidth, boardHeight);

                // 绑定交互事件
                addEvents(tile);
                
                tiles.push(tile);
                board.appendChild(tile);
                
                // 初始检查（万一随机到了正确位置）
                checkTileStatus(tile);
            }
        }

        function updateTileDisplay(tile, imgIdx, bW, bH) {
            const row = Math.floor(imgIdx / gridSize);
            const col = imgIdx % gridSize;
            const x = (col * 100) / (gridSize - 1);
            const y = (row * 100) / (gridSize - 1);
            // 存储当前显示的图片索引
            tile.dataset.currentImgIdx = imgIdx;
            tile.style.backgroundPosition = `${x}% ${y}%`;
        }

        function addEvents(tile) {
            // 触摸/鼠标 拖拽交换逻辑
            tile.draggable = true;

            tile.addEventListener('dragstart', handleDragStart);
            tile.addEventListener('dragover', handleDragOver);
            tile.addEventListener('drop', handleDrop);
            tile.addEventListener('dragend', handleDragEnd);

            // 移动端兼容
            tile.addEventListener('touchstart', handleTouchStart, {passive: false});
            tile.addEventListener('touchmove', handleTouchMove, {passive: false});
            tile.addEventListener('touchend', handleTouchEnd);
        }

        // --- 拖拽逻辑 ---

        function handleDragStart(e) {
            if (this.classList.contains('correct')) {
                e.preventDefault();
                return;
            }
            dragSrcEl = this;
            this.classList.add('dragging');
        }

        function handleDragOver(e) {
            if (e.preventDefault) e.preventDefault();
            return false;
        }

        function handleDrop(e) {
            if (e.stopPropagation) e.stopPropagation();
            if (dragSrcEl !== this && !this.classList.contains('correct')) {
                swapTiles(dragSrcEl, this);
            }
            return false;
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
            checkWin();
        }

        // --- 移动端模拟拖拽 ---
        let touchTarget = null;

        function handleTouchStart(e) {
            if (this.classList.contains('correct')) return;
            dragSrcEl = this;
            this.classList.add('dragging');
        }

        function handleTouchMove(e) {
            e.preventDefault(); // 禁止滚动
            const touch = e.touches[0];
            touchTarget = document.elementFromPoint(touch.clientX, touch.clientY);
        }

        function handleTouchEnd(e) {
            this.classList.remove('dragging');
            if (touchTarget && touchTarget.classList.contains('tile') && 
                touchTarget !== dragSrcEl && !touchTarget.classList.contains('correct')) {
                swapTiles(dragSrcEl, touchTarget);
                checkWin();
            }
            touchTarget = null;
        }

        function swapTiles(tile1, tile2) {
            const tempImgIdx = tile1.dataset.currentImgIdx;
            const tempBgPos = tile1.style.backgroundPosition;

            tile1.dataset.currentImgIdx = tile2.dataset.currentImgIdx;
            tile1.style.backgroundPosition = tile2.style.backgroundPosition;

            tile2.dataset.currentImgIdx = tempImgIdx;
            tile2.style.backgroundPosition = tempBgPos;

            checkTileStatus(tile1);
            checkTileStatus(tile2);
        }

        function checkTileStatus(tile) {
            if (tile.dataset.currentImgIdx == tile.dataset.correctIndex) {
                tile.classList.add('correct');
                tile.draggable = false;
            }
        }

        function checkWin() {
            const allCorrect = Array.from(document.querySelectorAll('.tile'))
                                    .every(t => t.classList.contains('correct'));
            if (allCorrect) {
                statusDisplay.innerText = "🎉 拼图成功！";
            }
        }
    </script>
</body>
</html>
