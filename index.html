<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拼图小游戏 v2.1 高清版</title>
    <style>
        :root {
            --primary: #007aff;
            --success: #1d7a2a;
            --bg: #f5f5f7;
            --white: #ffffff;
            --footer-h: 80px;
        }

        /* 视口锁定：100dvh 适配移动端工具栏 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100dvh; 
            overflow: hidden;
            background-color: var(--bg);
            font-family: -apple-system, system-ui, sans-serif;
            touch-action: none; 
        }

        .app-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        /* 顶部 UI */
        #header-ui {
            flex-shrink: 0;
            padding: 10px 5px;
            text-align: center;
        }
        h2 { margin: 0 0 10px; font-size: 1.2rem; color: #333; }

        .control-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        
        button, select {
            padding: 8px 16px; font-size: 14px; border-radius: 10px;
            border: 1px solid #d1d1d6; background: var(--white); cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); background: #f2f2f7; }
        
        #origin-btn { display: none; background: var(--primary); color: white; border: none; }

        /* 中部游戏区：动态挤压 */
        #game-zone {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            min-height: 0; 
            overflow: hidden;
        }

        /* Canvas 高清显示设置 */
        canvas {
            background-color: #fff;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            display: block;
            image-rendering: -webkit-optimize-contrast;
        }

        /* 底部成功区：固定高度 */
        #footer-ui {
            height: var(--footer-h);
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #success-msg {
            font-size: 32px;
            font-weight: bold;
            color: var(--success);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        #success-msg.visible { opacity: 1; transform: translateY(0); }

        /* 蒙层原图 */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            justify-content: center; align-items: center;
        }
        #modal img { max-width: 90%; max-height: 85%; object-fit: contain; border: 2px solid #fff; }
        #close-modal {
            position: absolute; top: 40px; right: 30px;
            width: 44px; height: 44px; background: #fff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: #000; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div id="header-ui">
        <h2>拼图小游戏，版本 2.1</h2>
        <div class="control-row">
            <input type="file" id="img-loader" accept="image/*" style="display:none">
            <button onclick="document.getElementById('img-loader').click()">选择图片</button>
            <button id="origin-btn" onclick="toggleModal(true)">显示原图</button>
        </div>
        <div class="control-row">
            <select id="diff-level">
                <option value="3">3 × 3</option>
                <option value="5">5 × 5</option>
                <option value="8">8 × 8</option>
            </select>
            <button onclick="bootGame()">开始游戏</button>
            <button onclick="bootGame()">重新开始</button>
        </div>
    </div>

    <div id="game-zone">
        <canvas id="puzzleBox"></canvas>
    </div>

    <div id="footer-ui">
        <div id="success-msg">拼图成功</div>
    </div>
</div>

<div id="modal">
    <div id="close-modal" onclick="toggleModal(false)">×</div>
    <img id="modal-view" src="">
</div>

<script>
    const cvs = document.getElementById('puzzleBox');
    const ctx = cvs.getContext('2d');
    const imgLoader = document.getElementById('img-loader');
    const originBtn = document.getElementById('origin-btn');
    const successMsg = document.getElementById('success-msg');
    const diffLevel = document.getElementById('diff-level');
    const modalView = document.getElementById('modal-view');

    let sourceImg = new Image();
    let grid = [];
    let size = 3;
    let lW, lH; // 逻辑宽高
    let dpr = window.devicePixelRatio || 1;
    
    let activePiece = null;
    let isDragging = false;
    let cursor = { x: 0, y: 0 };
    let targetIdx = -1;
    let particles = [];
    let finished = false;

    // 1. 高清重置算法：适配 Retina 屏幕
    imgLoader.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            sourceImg.onload = () => {
                originBtn.style.display = 'block';
                modalView.src = sourceImg.src;
                bootGame();
            };
            sourceImg.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    function syncDPI() {
        if (!sourceImg.src) return;
        
        const zone = document.getElementById('game-zone');
        const maxLW = zone.clientWidth - 20; 
        const maxLH = zone.clientHeight - 20;

        const ratio = sourceImg.width / sourceImg.height;

        lW = maxLW;
        lH = lW / ratio;

        if (lH > maxLH) {
            lH = maxLH;
            lW = lH * ratio;
        }

        // 高清化设置核心
        cvs.width = lW * dpr;
        cvs.height = lH * dpr;
        cvs.style.width = lW + 'px';
        cvs.style.height = lH + 'px';

        // 设置全局渲染平滑度
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        
        // 核心：缩放上下文
        ctx.resetTransform();
        ctx.scale(dpr, dpr);
    }

    window.addEventListener('resize', () => {
        if (sourceImg.src) {
            syncDPI();
            render();
        }
    });

    function toggleModal(val) { document.getElementById('modal').style.display = val ? 'flex' : 'none'; }

    // 2. 游戏核心逻辑
    function bootGame() {
        if (!sourceImg.src) return;
        finished = false;
        successMsg.classList.remove('visible');
        particles = [];
        size = parseInt(diffLevel.value);
        
        syncDPI();

        grid = [];
        for (let i = 0; i < size * size; i++) {
            grid.push({ orig: i, curr: i, locked: false });
        }

        // 随机洗牌
        do {
            for (let i = grid.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [grid[i].curr, grid[j].curr] = [grid[j].curr, grid[i].curr];
            }
        } while (isSolved());

        refreshLocks();
        requestAnimationFrame(loop);
    }

    function isSolved() { return grid.every(p => p.curr === p.orig); }

    function refreshLocks() {
        let win = true;
        grid.forEach(p => {
            if (p.curr === p.orig) p.locked = true;
            else { p.locked = false; win = false; }
        });
        if (win && grid.length > 0 && !finished) {
            finished = true;
            successMsg.classList.add('visible');
            triggerConfetti();
        }
    }

    // 3. 增强型交互适配
    function getCursorPos(e) {
        const rect = cvs.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    cvs.addEventListener('mousedown', onStart);
    cvs.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, { passive: false });

    function onStart(e) {
        if (finished) return;
        const pos = getCursorPos(e);
        const cw = lW / size, ch = lH / size;
        const idx = Math.floor(pos.y / ch) * size + Math.floor(pos.x / cw);
        const p = grid.find(item => item.curr === idx);
        
        if (p && !p.locked) {
            activePiece = p; isDragging = true; cursor = pos;
        }
    }

    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', (e) => { if(isDragging) e.preventDefault(); onMove(e); }, { passive: false });

    function onMove(e) {
        if (!isDragging) return;
        cursor = getCursorPos(e);
        const cw = lW / size, ch = lH / size;
        const col = Math.floor(cursor.x / cw), row = Math.floor(cursor.y / ch);
        targetIdx = (col >= 0 && col < size && row >= 0 && row < size) ? row * size + col : -1;
    }

    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchend', onEnd);

    function onEnd() {
        if (!isDragging) return;
        if (targetIdx !== -1) {
            const targetPiece = grid.find(p => p.curr === targetIdx);
            if (targetPiece && !targetPiece.locked && targetPiece !== activePiece) {
                const tmp = activePiece.curr;
                activePiece.curr = targetPiece.curr;
                targetPiece.curr = tmp;
            }
        }
        activePiece = null; isDragging = false; targetIdx = -1;
        refreshLocks();
    }

    // 4. 渲染循环
    function loop() {
        render();
        requestAnimationFrame(loop);
    }

    function render() {
        ctx.clearRect(0, 0, lW, lH);
        const cw = lW / size, ch = lH / size;

        // 1. 绘制静态层
        grid.forEach(p => {
            if (p !== activePiece) drawPiece(p, cw, ch);
        });

        // 2. 目标高亮
        if (isDragging && targetIdx !== -1) {
            const tp = grid.find(p => p.curr === targetIdx);
            if (tp && !tp.locked) {
                ctx.save();
                ctx.strokeStyle = "rgba(0, 122, 255, 0.8)";
                ctx.lineWidth = 4;
                ctx.strokeRect((targetIdx % size) * cw + 2, Math.floor(targetIdx / size) * ch + 2, cw - 4, ch - 4);
                ctx.restore();
            }
        }

        // 3. 绘制拖拽块层
        if (activePiece) {
            ctx.save();
            ctx.shadowBlur = 15; ctx.shadowColor = "rgba(0,0,0,0.4)";
            ctx.globalAlpha = 0.85;
            paintFragment(activePiece, cursor.x - cw/2, cursor.y - ch/2, cw, ch);
            ctx.restore();
        }

        // 4. 特效层
        if (particles.length > 0) {
            particles.forEach((p, i) => {
                p.y += p.v; p.x += Math.sin(p.a) * 2;
                ctx.fillStyle = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2); ctx.fill();
                if (p.y > lH) particles.splice(i, 1);
            });
        }
    }

    function drawPiece(p, cw, ch) {
        paintFragment(p, (p.curr % size) * cw, Math.floor(p.curr / size) * ch, cw, ch);
    }

    function paintFragment(p, x, y, cw, ch) {
        const sw = sourceImg.width / size;
        const sh = sourceImg.height / size;
        const sx = (p.orig % size) * sw;
        const sy = Math.floor(p.orig / size) * sh;

        // 渲染图片
        ctx.drawImage(sourceImg, sx, sy, sw, sh, x, y, cw, ch);

        // 绘制边框：锁定绿色，默认白色
        ctx.strokeStyle = p.locked ? "lime" : "white";
        ctx.lineWidth = p.locked ? 3 : 1;
        ctx.strokeRect(x, y, cw, ch);
    }

    function triggerConfetti() {
        const palette = ['#FF3B30', '#4CD964', '#007AFF', '#FFCC00', '#FF9500', '#5856D6'];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * lW, y: -20,
                s: Math.random() * 4 + 2,
                c: palette[Math.floor(Math.random() * palette.length)],
                v: Math.random() * 3 + 3, a: Math.random() * 6
            });
        }
    }
</script>
</body>
</html>
