<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拼图小游戏 v2.6 - 旗舰版</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent-color: #4caf50;
            --header-h: 50px;
            --footer-h: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            height: 100dvh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            touch-action: none;
        }

        /* 布局约束 */
        header, .controls, footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 10;
        }

        header { height: var(--header-h); background: var(--panel-bg); border-bottom: 1px solid #444; }
        .controls { height: 50px; background: rgba(45,45,45,0.8); gap: 10px; }
        footer { height: var(--footer-h); justify-content: center; }

        .title { font-weight: bold; font-size: 14px; }
        .level-info { font-family: monospace; color: var(--accent-color); }

        button {
            background: #444;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.95); background: #555; }
        button.primary { background: var(--accent-color); font-weight: bold; }
        button.hidden { display: none; }

        select {
            background: #444;
            color: white;
            border: 1px solid #555;
            padding: 4px;
            border-radius: 4px;
        }

        #game-container {
            flex: 1;
            position: relative;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            touch-action: none;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }

        #success-msg {
            font-size: 24px;
            font-weight: 900;
            color: #4caf50;
            text-shadow: 0 0 10px rgba(76,175,80,0.5);
            opacity: 0;
            transform: scale(0.8);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #success-msg.show { opacity: 1; transform: scale(1.1); }

        /* 预加载遮罩 */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: 0.5s;
        }
        #loader.fade { opacity: 0; pointer-events: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="title">拼图 v2.6</div>
    <div class="level-info" id="level-display">加载中...</div>
    <button onclick="changeLevel(0)">选择图片</button>
</header>

<div class="controls">
    <button id="prev-btn" class="hidden" onclick="changeLevel(-1)">上一关</button>
    <button id="hint-btn" class="hidden" onmousedown="toggleHint(true)" onmouseup="toggleHint(false)" ontouchstart="toggleHint(true)" ontouchend="toggleHint(false)">显示原图</button>
    <div style="flex:1"></div>
    <button id="next-btn" class="primary" onclick="changeLevel(1)">下一关</button>
</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<div class="controls" style="border-top: 1px solid #333;">
    <select id="diff-select" onchange="resetGame()">
        <option value="3">难度: 3x3</option>
        <option value="5" selected>难度: 5x5</option>
        <option value="8">难度: 8x8</option>
    </select>
    <button onclick="resetGame()">重新开始</button>
</div>

<footer>
    <div id="success-msg">拼图成功</div>
</footer>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-size:12px; color:#666;">初始化异步引擎...</p>
</div>

<script>
/**
 * 拼图 v2.6 核心架构
 * 高级异步调度 + 并查集连通算法
 */

const CONFIG = {
    totalLevels: 50,
    snapTolerance: 20, // 吸附阈值
    ids: Array.from({length: 50}, (_, i) => 10 + i * 3), // 生成50个Picsum ID
    isRetina: window.devicePixelRatio > 1
};

class GameEngine {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.dpr = window.devicePixelRatio || 1;
        
        this.currentLevel = 1;
        this.imgCache = new Map();
        this.pieces = [];
        this.activeGroup = null;
        this.isWin = false;
        this.showHint = false;
        
        this.img = null;
        this.gridSize = 5;
        this.rect = { w: 0, h: 0, scale: 1 };
        
        this.initEvents();
    }

    // 1. 核心修复：优先级调度加载
    async loadLevel(level) {
        document.getElementById('loader').classList.remove('fade');
        const id = CONFIG.ids[level - 1];
        const url = `https://picsum.photos/id/${id}/800/1000`;

        try {
            // Priority 0: 必须加载当前图
            let img;
            if (this.imgCache.has(level)) {
                img = this.imgCache.get(level);
            } else {
                img = await this.loadImage(url);
                this.imgCache.set(level, img);
            }
            
            this.img = img;
            this.currentLevel = level;
            this.updateUI();
            this.resetGame();
            
            document.getElementById('loader').classList.add('fade');

            // Priority 1: 延迟 500ms 后静默串行预加载后续
            setTimeout(() => this.preloadNext(level + 1), 500);
            
        } catch (e) {
            console.error("加载失败，跳转下一关");
            this.changeLevel(1);
        }
    }

    loadImage(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = url;
        });
    }

    async preloadNext(level) {
        if (level > CONFIG.totalLevels || this.imgCache.has(level)) return;
        const id = CONFIG.ids[level - 1];
        try {
            const img = await this.loadImage(`https://picsum.photos/id/${id}/800/1000`);
            this.imgCache.set(level, img);
            console.log(`静默预加载完成: Level ${level}`);
            // 递归串行加载
            this.preloadNext(level + 1);
        } catch(e) {}
    }

    // 2. 响应式布局计算
    resize() {
        const container = document.getElementById('game-container');
        const cw = container.clientWidth - 40;
        const ch = container.clientHeight - 40;
        
        const imgRatio = this.img.width / this.img.height;
        const contRatio = cw / ch;

        if (imgRatio > contRatio) {
            this.rect.w = cw;
            this.rect.h = cw / imgRatio;
        } else {
            this.rect.h = ch;
            this.rect.w = ch * imgRatio;
        }

        this.canvas.width = this.rect.w * this.dpr;
        this.canvas.height = this.rect.h * this.dpr;
        this.canvas.style.width = `${this.rect.w}px`;
        this.canvas.style.height = `${this.rect.h}px`;
        this.ctx.scale(this.dpr, this.dpr);
    }

    // 3. 核心算法：全能 N 片组合 (Union-Find 思想简化版)
    resetGame() {
        this.gridSize = parseInt(document.getElementById('diff-select').value);
        this.isWin = false;
        document.getElementById('success-msg').classList.remove('show');
        this.resize();

        const pw = this.rect.w / this.gridSize;
        const ph = this.rect.h / this.gridSize;
        this.pieces = [];

        for (let r = 0; r < this.gridSize; r++) {
            for (let c = 0; c < this.gridSize; c++) {
                this.pieces.push({
                    id: r * this.gridSize + c,
                    r, c,
                    currX: Math.random() * (this.rect.w - pw),
                    currY: Math.random() * (this.rect.h - ph),
                    targetX: c * pw,
                    targetY: r * ph,
                    w: pw,
                    h: ph,
                    isLocked: false,
                    groupId: -1 // -1 表示独立
                });
            }
        }
        this.render();
    }

    // 更新连通分支
    checkConnections() {
        let changed = true;
        while (changed) {
            changed = false;
            for (let i = 0; i < this.pieces.length; i++) {
                for (let j = 0; j < this.pieces.length; j++) {
                    if (i === j) continue;
                    const p1 = this.pieces[i];
                    const p2 = this.pieces[j];
                    
                    // 仅检测未锁定的或同一个组的
                    if (p1.isLocked || p2.isLocked) continue;

                    // 计算相对位置是否正确
                    const idealDX = (p2.c - p1.c) * p1.w;
                    const idealDY = (p2.r - p1.r) * p1.h;
                    const currDX = p2.currX - p1.currX;
                    const currDY = p2.currY - p1.currY;

                    const error = Math.sqrt((idealDX - currDX)**2 + (idealDY - currDY)**2);

                    if (error < CONFIG.snapTolerance) {
                        // 判定为应连接
                        if (this.mergeGroups(p1, p2)) {
                            // 修正位置
                            p2.currX = p1.currX + idealDX;
                            p2.currY = p1.currY + idealDY;
                            changed = true;
                        }
                    }
                }
            }
        }

        // 检查是否整体归位
        this.pieces.forEach(p => {
            const distToTarget = Math.sqrt((p.currX - p.targetX)**2 + (p.currY - p.targetY)**2);
            if (distToTarget < CONFIG.snapTolerance) {
                p.currX = p.targetX;
                p.currY = p.targetY;
                p.isLocked = true;
            }
        });

        if (this.pieces.every(p => p.isLocked)) this.handleWin();
    }

    mergeGroups(p1, p2) {
        if (p1.groupId !== -1 && p1.groupId === p2.groupId) return false;
        
        const newId = p1.groupId !== -1 ? p1.groupId : (p2.groupId !== -1 ? p2.groupId : p1.id);
        const oldId2 = p2.groupId;
        const oldId1 = p1.groupId;

        p1.groupId = newId;
        p2.groupId = newId;
        
        // 扩散到整个旧组
        if (oldId2 !== -1 || oldId1 !== -1) {
            this.pieces.forEach(p => {
                if (p.groupId === oldId2 && oldId2 !== -1) p.groupId = newId;
                if (p.groupId === oldId1 && oldId1 !== -1) p.groupId = newId;
            });
        }
        return true;
    }

    // 4. 高清渲染与智能边框
    render() {
        this.ctx.clearRect(0, 0, this.rect.w, this.rect.h);
        
        if (this.showHint) {
            this.ctx.globalAlpha = 0.3;
            this.ctx.drawImage(this.img, 0, 0, this.rect.w, this.rect.h);
            this.ctx.globalAlpha = 1.0;
        }

        // 绘制顺序：锁定碎片 -> 普通碎片 -> 激活组（置顶）
        const sorted = [...this.pieces].sort((a, b) => {
            if (a.isLocked !== b.isLocked) return a.isLocked ? -1 : 1;
            if (this.activeGroup && (a.groupId === this.activeGroup || a.id === this.activeGroup)) return 1;
            return 0;
        });

        sorted.forEach(p => {
            this.ctx.save();
            
            // 裁剪区域
            this.ctx.beginPath();
            this.ctx.rect(p.currX, p.currY, p.w, p.h);
            this.ctx.clip();

            // 绘制图像
            const sx = (p.c * this.img.width) / this.gridSize;
            const sy = (p.r * this.img.height) / this.gridSize;
            const sw = this.img.width / this.gridSize;
            const sh = this.img.height / this.gridSize;
            this.ctx.drawImage(this.img, sx, sy, sw, sh, p.currX, p.currY, p.w, p.h);

            this.ctx.restore();

            // 智能边框渲染
            this.ctx.beginPath();
            this.ctx.rect(p.currX, p.currY, p.w, p.h);
            if (p.isLocked) {
                this.ctx.strokeStyle = '#4caf50';
                this.ctx.lineWidth = 0.5; // 锁定后变细
            } else if (p.groupId !== -1) {
                this.ctx.strokeStyle = '#ffeb3b';
                this.ctx.lineWidth = 2;
            } else {
                this.ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                this.ctx.lineWidth = 1;
            }
            this.ctx.stroke();
        });
    }

    // 5. 交互引擎（修复点击不响应问题）
    initEvents() {
        const handleStart = (e) => {
            if (this.isWin) return;
            e.preventDefault();
            const pos = this.getPos(e);
            
            // 倒序寻找点击的碎片（从顶层开始）
            for (let i = this.pieces.length - 1; i >= 0; i--) {
                const p = this.pieces[i];
                if (!p.isLocked && pos.x >= p.currX && pos.x <= p.currX + p.w && pos.y >= p.currY && pos.y <= p.currY + p.h) {
                    this.dragTarget = p;
                    this.activeGroup = p.groupId !== -1 ? p.groupId : p.id;
                    this.lastPos = pos;
                    
                    // 记录组内所有片相对于点击点的偏移
                    this.groupMembers = this.pieces.filter(item => 
                        (p.groupId !== -1 && item.groupId === p.groupId) || (item.id === p.id)
                    );
                    break;
                }
            }
        };

        const handleMove = (e) => {
            if (!this.dragTarget) return;
            const pos = this.getPos(e);
            const dx = pos.x - this.lastPos.x;
            const dy = pos.y - this.lastPos.y;

            // 整体移动
            this.groupMembers.forEach(p => {
                p.currX += dx;
                p.currY += dy;
            });

            // 边界检查（Auto-Clamping）
            this.clampGroup();

            this.lastPos = pos;
            this.render();
        };

        const handleEnd = () => {
            if (!this.dragTarget) return;
            this.checkConnections();
            this.dragTarget = null;
            this.activeGroup = null;
            this.render();
        };

        this.canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        this.canvas.addEventListener('touchstart', handleStart, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);
    }

    getPos(e) {
        const rect = this.canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    clampGroup() {
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        this.groupMembers.forEach(p => {
            minX = Math.min(minX, p.currX);
            minY = Math.min(minY, p.currY);
            maxX = Math.max(maxX, p.currX + p.w);
            maxY = Math.max(maxY, p.currY + p.h);
        });

        let offX = 0, offY = 0;
        if (minX < 0) offX = -minX;
        if (maxX > this.rect.w) offX = this.rect.w - maxX;
        if (minY < 0) offY = -minY;
        if (maxY > this.rect.h) offY = this.rect.h - maxY;

        this.groupMembers.forEach(p => {
            p.currX += offX;
            p.currY += offY;
        });
    }

    handleWin() {
        this.isWin = true;
        document.getElementById('success-msg').classList.add('show');
        document.getElementById('prev-btn').classList.remove('hidden');
        
        // 3秒后自动下一关
        setTimeout(() => {
            if (this.isWin) this.changeLevel(1);
        }, 3000);
    }

    updateUI() {
        document.getElementById('level-display').innerText = `第 ${this.currentLevel}/${CONFIG.totalLevels} 关`;
        document.getElementById('hint-btn').classList.remove('hidden');
    }

    changeLevel(delta) {
        let next = this.currentLevel + delta;
        if (delta === 0) next = Math.floor(Math.random() * CONFIG.totalLevels) + 1;
        if (next < 1) next = CONFIG.totalLevels;
        if (next > CONFIG.totalLevels) next = 1;
        this.loadLevel(next);
    }
}

// 全局实例
const game = new GameEngine();
window.onload = () => game.loadLevel(1);

// 桥接 UI 函数
function resetGame() { game.resetGame(); }
function changeLevel(d) { game.changeLevel(d); }
function toggleHint(show) { 
    game.showHint = show;
    game.render();
}

// 禁止 iOS 橡皮筋
document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 1) e.preventDefault();
}, { passive: false });
</script>

</body>
</html>
