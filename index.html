<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拼图小游戏 v1.6</title>
    <style>
        :root {
            --primary: #007aff;
            --success: #28a745;
            --bg: #f5f5f7;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            touch-action: none; user-select: none;
        }
        h2 { margin: 10px 0; font-size: 1.4rem; color: #333; }
        .row { display: flex; gap: 8px; margin: 5px 0; flex-wrap: wrap; justify-content: center; }
        button, select {
            padding: 8px 16px; border-radius: 8px; border: 1px solid #ccc;
            background: white; font-size: 14px; cursor: pointer;
        }
        button:active { background: #eee; }
        #show-origin-btn { display: none; background: var(--primary); color: white; border: none; }
        
        #game-container {
            margin-top: 15px;
            position: relative;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            background: #fff;
        }
        canvas { display: block; cursor: move; }

        /* 原图遮罩层 */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            justify-content: center; align-items: center;
        }
        #overlay img { max-width: 95%; max-height: 85%; object-fit: contain; border: 2px solid #fff; }
        #close-btn { position: absolute; top: 20px; right: 20px; color: white; font-size: 40px; cursor: pointer; }

        #success-label {
            margin-top: 20px; font-size: 22px; font-weight: bold;
            color: var(--success); height: 30px;
        }
    </style>
</head>
<body>

    <h2>拼图小游戏，版本 1.6</h2>

    <div class="row">
        <input type="file" id="loader" accept="image/*" style="display:none">
        <button onclick="document.getElementById('loader').click()">选择图片</button>
        <button id="show-origin-btn" onclick="showOverlay(true)">显示原图</button>
    </div>

    <div class="row">
        <select id="diff">
            <option value="3">3*3</option>
            <option value="5">5*5</option>
            <option value="8">8*8</option>
        </select>
        <button onclick="startGame()">开始游戏</button>
        <button onclick="startGame()">重新开始</button>
    </div>

    <div id="game-container">
        <canvas id="cvs"></canvas>
    </div>

    <div id="success-label"></div>

    <div id="overlay">
        <span id="close-btn" onclick="showOverlay(false)">×</span>
        <img id="preview-img">
    </div>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    const loader = document.getElementById('loader');
    const diffEl = document.getElementById('diff');
    const successLabel = document.getElementById('success-label');
    const showBtn = document.getElementById('show-origin-btn');
    const previewImg = document.getElementById('preview-img');

    let img = new Image();
    let pieces = [];
    let side; // 难度系数
    let pW, pH; // 碎片宽高
    let dragItem = null;
    let isMoving = false;
    let mX, mY;
    let hoverIdx = -1;

    loader.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        img.onload = () => {
            showBtn.style.display = 'block';
            previewImg.src = img.src;
            // 比例适配核心逻辑
            const screenWidth = Math.min(window.innerWidth - 30, 600);
            const ratio = img.width / img.height;
            cvs.width = screenWidth;
            cvs.height = screenWidth / ratio;
            startGame();
        };
        img.src = url;
    };

    function showOverlay(val) { document.getElementById('overlay').style.display = val ? 'flex' : 'none'; }

    function startGame() {
        if (!img.src) return;
        successLabel.innerText = "";
        side = parseInt(diffEl.value);
        pW = cvs.width / side;
        pH = cvs.height / side;
        
        pieces = [];
        for (let i = 0; i < side * side; i++) {
            pieces.push({
                orig: i,
                curr: i,
                locked: false
            });
        }

        // 随机打乱
        do {
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i].curr, pieces[j].curr] = [pieces[j].curr, pieces[i].curr];
            }
        } while (isWin()); // 确保初始不是完成状态

        updateLocks();
        render();
    }

    function updateLocks() {
        let allReady = true;
        pieces.forEach(p => {
            if (p.curr === p.orig) p.locked = true;
            else allReady = false;
        });
        if (allReady && pieces.length > 0) successLabel.innerText = "拼图成功";
    }

    function isWin() {
        return pieces.every(p => p.curr === p.orig);
    }

    function render() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        
        // 1. 画底层图片（非拖拽中）
        pieces.forEach(p => {
            if (p === dragItem) return;
            drawPiece(p);
        });

        // 2. 画高亮目标格
        if (isMoving && hoverIdx !== -1) {
            const targetP = pieces.find(p => p.curr === hoverIdx);
            if (targetP && !targetP.locked) {
                ctx.strokeStyle = "rgba(0, 122, 255, 0.6)";
                ctx.lineWidth = 6;
                const pos = getXY(hoverIdx);
                ctx.strokeRect(pos.x + 3, pos.y + 3, pW - 6, pH - 6);
            }
        }

        // 3. 画拖拽项（置顶）
        if (dragItem) {
            ctx.save();
            ctx.globalAlpha = 0.8;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            drawAt(dragItem, mX - pW / 2, mY - pH / 2);
            ctx.restore();
        }
    }

    function drawPiece(p) {
        const pos = getXY(p.curr);
        drawAt(p, pos.x, pos.y);
    }

    function drawAt(p, x, y) {
        const sx = (p.orig % side) * (img.width / side);
        const sy = Math.floor(p.orig / side) * (img.height / side);
        const sw = img.width / side;
        const sh = img.height / side;

        ctx.drawImage(img, sx, sy, sw, sh, x, y, pW, pH);

        // 边框规则：锁定绿色，默认白色
        ctx.strokeStyle = p.locked ? "lime" : "white";
        ctx.lineWidth = p.locked ? 3 : 1;
        ctx.strokeRect(x, y, pW, pH);
    }

    function getXY(index) {
        return { x: (index % side) * pW, y: Math.floor(index / side) * pH };
    }

    // 交互适配
    function getPos(e) {
        const rect = cvs.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    function start(e) {
        if (successLabel.innerText !== "") return;
        const pos = getPos(e);
        const idx = Math.floor(pos.y / pH) * side + Math.floor(pos.x / pW);
        const p = pieces.find(item => item.curr === idx);
        
        if (p && !p.locked) {
            dragItem = p;
            isMoving = true;
            mX = pos.x; mY = pos.y;
        }
    }

    function move(e) {
        if (!isMoving) return;
        if (e.cancelable) e.preventDefault(); 
        const pos = getPos(e);
        mX = pos.x; mY = pos.y;
        
        const c = Math.floor(mX / pW);
        const r = Math.floor(mY / pH);
        if (c >= 0 && c < side && r >= 0 && r < side) hoverIdx = r * side + c;
        else hoverIdx = -1;
        
        render();
    }

    function end() {
        if (!isMoving) return;
        if (hoverIdx !== -1) {
            const target = pieces.find(p => p.curr === hoverIdx);
            // 目标不能是自己，且不能是已锁定的
            if (target && !target.locked && target !== dragItem) {
                const temp = dragItem.curr;
                dragItem.curr = target.curr;
                target.curr = temp;
            }
        }
        dragItem = null; isMoving = false; hoverIdx = -1;
        updateLocks();
        render();
    }

    cvs.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);

    cvs.addEventListener('touchstart', start, {passive: false});
    window.addEventListener('touchmove', move, {passive: false});
    window.addEventListener('touchend', end);

</script>
</body>
</html>
