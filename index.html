<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>拼图小游戏 v2.0</title>
    <style>
        :root {
            --primary: #007aff;
            --success: #1d7a2a;
            --bg: #f5f5f7;
            --white: #ffffff;
        }

        /* 核心修复：100dvh 解决 iOS 工具栏遮挡 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100dvh; 
            overflow: hidden;
            background-color: var(--bg);
            font-family: -apple-system, system-ui, sans-serif;
            touch-action: none; /* 彻底防止手势干扰 */
        }

        /* Flex 垂直布局容器 */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        /* 顶部标题与控制区 */
        #ui-header {
            flex-shrink: 0;
            padding: 10px 0 5px;
            text-align: center;
            background: var(--bg);
            z-index: 10;
        }
        h2 { margin: 0 0 8px; font-size: 1.1rem; color: #333; }

        .btn-group { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        
        button, select {
            padding: 8px 14px; font-size: 14px; border-radius: 8px;
            border: 1px solid #ccc; background: var(--white); cursor: pointer;
            transition: background 0.2s;
        }
        button:active { background: #ebebeb; }
        
        #origin-btn { display: none; background: var(--primary); color: white; border: none; }

        /* 核心游戏区：自动挤压逻辑 */
        #game-container {
            flex: 1; /* 占据剩余所有空间 */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            min-height: 0; /* 允许 Flex 项目在空间不足时缩小 */
            overflow: hidden;
        }

        canvas {
            background-color: #fff;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            max-width: 100%;
            max-height: 100%;
        }

        /* 底部成功区：固定高度且优先级高 */
        #success-footer {
            height: 80px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            z-index: 10;
        }

        #success-text {
            font-size: 30px;
            font-weight: bold;
            color: var(--success);
            visibility: hidden; /* 使用 visibility 避免重排 */
            transform: scale(0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #success-text.show { visibility: visible; transform: scale(1); }

        /* 原图预览遮罩 */
        #mask {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            justify-content: center; align-items: center;
        }
        #mask img { max-width: 90%; max-height: 80%; border: 2px solid white; object-fit: contain; }
        #close-mask {
            position: absolute; top: 30px; right: 30px;
            width: 40px; height: 40px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div id="ui-header">
        <h2>拼图小游戏，版本 2.0</h2>
        <div class="btn-group">
            <input type="file" id="img-input" accept="image/*" style="display:none">
            <button onclick="document.getElementById('img-input').click()">选择图片</button>
            <button id="origin-btn" onclick="toggleMask(true)">显示原图</button>
        </div>
        <div class="btn-group">
            <select id="diff-select">
                <option value="3">3 × 3</option>
                <option value="5">5 × 5</option>
                <option value="8">8 × 8</option>
            </select>
            <button onclick="initGame()">开始游戏</button>
            <button onclick="initGame()">重新开始</button>
        </div>
    </div>

    <div id="game-container">
        <canvas id="puzzleCanvas"></canvas>
    </div>

    <div id="success-footer">
        <div id="success-text">拼图成功</div>
    </div>
</div>

<div id="mask">
    <div id="close-mask" onclick="toggleMask(false)">×</div>
    <img id="mask-img" src="" alt="原图预览">
</div>

<script>
    const canvas = document.getElementById('puzzleCanvas');
    const ctx = canvas.getContext('2d');
    const imgInput = document.getElementById('img-input');
    const originBtn = document.getElementById('origin-btn');
    const successText = document.getElementById('success-text');
    const diffSelect = document.getElementById('diff-select');
    const maskImg = document.getElementById('mask-img');

    let img = new Image();
    let pieces = [];
    let side = 3;
    let pW, pH; 
    let dragItem = null;
    let isDragging = false;
    let mousePos = { x: 0, y: 0 };
    let hoverIdx = -1;
    let confetti = [];
    let isWon = false;

    // 1. 图片加载与视口挤压算法
    imgInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            img.onload = () => {
                originBtn.style.display = 'block';
                maskImg.src = img.src;
                initGame();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    function adaptiveResize() {
        if (!img.src) return;
        
        // 获取容器实时尺寸
        const container = document.getElementById('game-container');
        const maxW = container.clientWidth - 20; 
        const maxH = container.clientHeight - 20;

        const imgRatio = img.width / img.height;

        let targetW = maxW;
        let targetH = targetW / imgRatio;

        // 核心挤压：如果高度溢出容器，则反向以高度为基准
        if (targetH > maxH) {
            targetH = maxH;
            targetW = targetH * imgRatio;
        }

        canvas.width = targetW;
        canvas.height = targetH;
        pW = canvas.width / side;
        pH = canvas.height / side;
    }

    window.addEventListener('resize', () => {
        if (img.src) {
            adaptiveResize();
            render();
        }
    });

    function toggleMask(show) { document.getElementById('mask').style.display = show ? 'flex' : 'none'; }

    // 2. 游戏核心逻辑
    function initGame() {
        if (!img.src) return;
        isWon = false;
        successText.classList.remove('show');
        confetti = [];
        side = parseInt(diffSelect.value);
        
        adaptiveResize();

        pieces = [];
        for (let i = 0; i < side * side; i++) {
            pieces.push({ orig: i, curr: i, locked: false });
        }

        // 打乱顺序
        do {
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i].curr, pieces[j].curr] = [pieces[j].curr, pieces[i].curr];
            }
        } while (checkWin());

        updateGameStatus();
        requestAnimationFrame(mainLoop);
    }

    function checkWin() {
        return pieces.every(p => p.curr === p.orig);
    }

    function updateGameStatus() {
        let winCount = 0;
        pieces.forEach(p => {
            if (p.curr === p.orig) {
                p.locked = true;
                winCount++;
            } else {
                p.locked = false;
            }
        });
        
        if (winCount === side * side && pieces.length > 0 && !isWon) {
            isWon = true;
            successText.classList.add('show');
            spawnConfetti();
        }
    }

    // 3. 交互逻辑（拖拽与触摸适配）
    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    canvas.addEventListener('mousedown', startAction);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(e); }, { passive: false });

    function startAction(e) {
        if (isWon) return;
        const pos = getCoords(e);
        const col = Math.floor(pos.x / pW);
        const row = Math.floor(pos.y / pH);
        const idx = row * side + col;

        const piece = pieces.find(p => p.curr === idx);
        if (piece && !piece.locked) {
            dragItem = piece;
            isDragging = true;
            mousePos = pos;
        }
    }

    window.addEventListener('mousemove', moveAction);
    window.addEventListener('touchmove', (e) => { if(isDragging) e.preventDefault(); moveAction(e); }, { passive: false });

    function moveAction(e) {
        if (!isDragging) return;
        mousePos = getCoords(e);
        const c = Math.floor(mousePos.x / pW), r = Math.floor(mousePos.y / pH);
        hoverIdx = (c >= 0 && c < side && r >= 0 && r < side) ? r * side + c : -1;
    }

    window.addEventListener('mouseup', endAction);
    window.addEventListener('touchend', endAction);

    function endAction() {
        if (!isDragging) return;
        if (hoverIdx !== -1) {
            const target = pieces.find(p => p.curr === hoverIdx);
            if (target && !target.locked && target !== dragItem) {
                const temp = dragItem.curr;
                dragItem.curr = target.curr;
                target.curr = temp;
            }
        }
        dragItem = null; isDragging = false; hoverIdx = -1;
        updateGameStatus();
    }

    // 4. 绘图引擎
    function mainLoop() {
        render();
        requestAnimationFrame(mainLoop);
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 绘制底层拼图
        pieces.forEach(p => {
            if (p !== dragItem) drawPiece(p);
        });

        // 目标高亮
        if (isDragging && hoverIdx !== -1) {
            const hoverPiece = pieces.find(p => p.curr === hoverIdx);
            if (hoverPiece && !hoverPiece.locked) {
                ctx.strokeStyle = "rgba(0, 122, 255, 0.8)";
                ctx.lineWidth = 5;
                ctx.strokeRect((hoverIdx % side) * pW + 2, Math.floor(hoverIdx / side) * pH + 2, pW - 4, pH - 4);
            }
        }

        // 绘制拖拽块
        if (dragItem) {
            ctx.save();
            ctx.shadowBlur = 20; ctx.shadowColor = "rgba(0,0,0,0.4)";
            ctx.globalAlpha = 0.8;
            const sx = (dragItem.orig % side) * (img.width / side);
            const sy = Math.floor(dragItem.orig / side) * (img.height / side);
            ctx.drawImage(img, sx, sy, img.width/side, img.height/side, mousePos.x - pW/2, mousePos.y - pH/2, pW, pH);
            ctx.restore();
        }

        // 绘制五彩纸屑
        if (confetti.length > 0) {
            confetti.forEach((c, i) => {
                c.y += c.vy; c.x += Math.cos(c.a) * 2;
                ctx.fillStyle = c.color;
                ctx.beginPath(); ctx.arc(c.x, c.y, c.s, 0, Math.PI * 2); ctx.fill();
                if (c.y > canvas.height) confetti.splice(i, 1);
            });
        }
    }

    function drawPiece(p) {
        const x = (p.curr % side) * pW, y = Math.floor(p.curr / side) * pH;
        const sx = (p.orig % side) * (img.width / side);
        const sy = Math.floor(p.orig / side) * (img.height / side);
        
        ctx.drawImage(img, sx, sy, img.width/side, img.height/side, x, y, pW, pH);
        
        ctx.strokeStyle = p.locked ? "lime" : "white";
        ctx.lineWidth = p.locked ? 4 : 1;
        ctx.strokeRect(x, y, pW, pH);
    }

    function spawnConfetti() {
        const colors = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF'];
        for (let i = 0; i < 120; i++) {
            confetti.push({
                x: Math.random() * canvas.width, y: -20,
                s: Math.random() * 4 + 2,
                color: colors[Math.floor(Math.random() * colors.length)],
                vy: Math.random() * 3 + 2, a: Math.random() * 2 * Math.PI
            });
        }
    }
</script>
</body>
</html>
