<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>拼图 v2.8 - 12关循环版</title>
<style>
* ,::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0e14;--surface:#161922;--surface2:#1e2230;--border:#2c3044;
  --text:#eae8e4;--text2:#8b8a94;--accent:#42a5f5;--accent2:#1e88e5;
  --green:#43a047;--yellow:#fdd835;--red:#ef5350;--radius:7px;
}
html,body{width:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:-apple-system,'SF Pro Text','PingFang SC','Noto Sans SC','Helvetica Neue',sans-serif;
  touch-action:none;overscroll-behavior:none;user-select:none;-webkit-user-select:none}
#app{display:flex;flex-direction:column;height:100dvh;width:100%;max-width:540px;margin:0 auto;padding:5px 8px 2px}
.row{display:flex;align-items:center;justify-content:space-between;gap:4px;padding:2px 0;flex-shrink:0}
.row.r2, .row.r3{justify-content:center;gap:6px}
.logo{font-size:14px;font-weight:800;letter-spacing:.5px;background:linear-gradient(135deg,#42a5f5,#ab47bc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.lvl{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap}
.btn{padding:5px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;outline:none;-webkit-appearance:none;line-height:1.4}
.btn:active{transform:scale(.94);filter:brightness(.85)}
.btn.blue{background:#007bff;color:#000;border-color:#007bff;font-weight:700}
.btn.gone{display:none}
select.sel{padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-size:12px;outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;min-width:62px;text-align:center}
#canvasWrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;min-height:0}
canvas#gc{display:block;touch-action:none}
#successMsg{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:22px;font-weight:900;color:var(--green);text-shadow:0 0 14px rgba(67,160,71,.5);opacity:0;transition:opacity .35s;pointer-events:none;white-space:nowrap;letter-spacing:1px}
#successMsg.show{opacity:1}
#loadTip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text2);font-size:13px;display:none}
#loadTip.show{display:block}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;z-index:100;align-items:center;justify-content:center}
#ov.show{display:flex}
#ov img{max-width:92vw;max-height:86vh;border-radius:10px}
#ovX{position:absolute;top:max(env(safe-area-inset-top),14px);right:18px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
.confetti-cv{position:fixed;inset:0;pointer-events:none;z-index:200}
</style>
</head>
<body>
<div id="app">
  <div class="row r1">
    <span class="logo">拼图 v2.8</span>
    <span class="lvl" id="lvlTxt">第 1 关</span>
    <button class="btn" id="bUpload">选择图片</button>
  </div>
  <div class="row r2">
    <button class="btn gone" id="bPrev">上一关</button>
    <button class="btn blue gone" id="bShow">显示原图</button>
    <button class="btn blue" id="bNext">下一关</button>
  </div>
  <div class="row r3">
    <select class="sel" id="sDiff">
      <option value="3">3×3</option>
      <option value="4" selected>4×4</option>
      <option value="5">5×5</option>
      <option value="6">6×6</option>
    </select>
    <button class="btn blue" id="bStart">开始</button>
  </div>
  <div id="canvasWrap">
    <canvas id="gc"></canvas>
    <div id="successMsg">🎉 拼图成功！</div>
    <div id="loadTip" class="show">加载中...</div>
  </div>
</div>
<div id="ov"><img id="ovImg" src=""><button id="ovX">✕</button></div>
<input type="file" id="fIn" accept="image/*" style="display:none">

<script>
(()=>{
'use strict';
/* ===== 关卡设定 ===== */
const LEVELS = Array.from({length: 12}, (_, i) => `https://finleyxtrdylan037-design.github.io/12/images/${i + 1}.jpg`);

const $=s=>document.getElementById(s);
const gc=$('gc'), ctx=gc.getContext('2d'), wrap=$('canvasWrap');
const bPrev=$('bPrev'),bNext=$('bNext'),bStart=$('bStart'),bUpload=$('bUpload'),bShow=$('bShow'),sDiff=$('sDiff'),lvlTxt=$('lvlTxt');
const ov=$('ov'),ovImg=$('ovImg'),ovX=$('ovX'),loadTip=$('loadTip'),successEl=$('successMsg'),fIn=$('fIn');

const S={
  level:0, gridN:4, pieces:[], img:null, customImg:null, isCustom:false, solved:false,
  drag:null, dragGroup:[], dragOX:0, dragOY:0, dragX:0, dragY:0,
  cw:0, ch:0, W:0, H:0, dpr:1, autoTimer:null, imgCache:{}, preloadQ:[], preloading:false
};

/* ===== 核心逻辑修改：下一关循环 ===== */
function goNext(){
  S.prevShown = true;
  bPrev.classList.remove('gone');
  
  // 如果当前是最后一关（索引11），则回到第一关（索引0）
  let nextIdx = S.level + 1;
  if (nextIdx >= LEVELS.length) {
    nextIdx = 0;
  }
  
  S.customImg = null; 
  loadLevel(nextIdx, false);
}

function goPrev(){
  if(S.level > 0){
    loadLevel(S.level - 1, false);
  } else {
    // 如果在第一关点上一关，可以跳到最后一关（可选）
    loadLevel(LEVELS.length - 1, false);
  }
}

/* ===== 以下为原有的必要拼图代码，保持不变 ===== */
function loadImg(src){
  return new Promise((ok,no)=>{
    if(S.imgCache[src]){ok(S.imgCache[src]);return}
    const im=new Image();im.crossOrigin='anonymous';
    im.onload=()=>{S.imgCache[src]=im;ok(im)};
    im.onerror=()=>no(new Error('fail'));
    im.src=src;
  });
}

function makePieces(n){
  const arr=[];
  for(let r=0;r<n;r++) for(let c=0;c<n;c++) arr.push({oR:r,oC:c,cR:r,cC:c,locked:false});
  const pos=arr.map(p=>({r:p.cR,c:p.cC}));
  for(let i=pos.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[pos[i],pos[j]]=[pos[j],pos[i]]}
  arr.forEach((p,i)=>{p.cR=pos[i].r;p.cC=pos[i].c});
  arr.forEach(p=>{if(p.cR===p.oR&&p.cC===p.oC) p.locked=true});
  return arr;
}

function pieceAt(r,c){return S.pieces.find(p=>p.cR===r&&p.cC===c)}

function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,3); S.dpr=dpr;
  const wW=wrap.clientWidth-4, wH=wrap.clientHeight-4;
  if(!S.img){gc.width=gc.height=0;return}
  const asp=S.img.width/S.img.height;
  let cw,ch;
  if(wW/wH>asp){ch=wH;cw=ch*asp}else{cw=wW;ch=cw/asp}
  cw=Math.floor(cw);ch=Math.floor(ch);
  const maxH=wH-34; if(ch>maxH){ch=maxH;cw=Math.floor(ch*asp)}
  S.W=cw;S.H=ch; gc.style.width=cw+'px';gc.style.height=ch+'px';
  gc.width=Math.round(cw*dpr);gc.height=Math.round(ch*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0); S.cw=cw/S.gridN;S.ch=ch/S.gridN;
}

function render(){
  if(!S.img) return;
  const {gridN:n,cw,ch,W,H,pieces}=S;
  ctx.clearRect(0,0,W,H);
  if(S.solved){ctx.drawImage(S.img,0,0,W,H);return}
  pieces.forEach(p=>{
    let dx=p.cC*cw, dy=p.cR*ch;
    const sx=p.oC*(S.img.width/n), sy=p.oR*(S.img.height/n);
    const sw=S.img.width/n, sh=S.img.height/n;
    ctx.save(); ctx.beginPath();ctx.rect(dx,dy,cw,ch);ctx.clip();
    ctx.drawImage(S.img,sx,sy,sw,sh,dx,dy,cw,ch); ctx.restore();
    ctx.strokeStyle=p.locked?'#43a047':'rgba(255,255,255,0.3)';
    ctx.lineWidth=p.locked?2:1; ctx.strokeRect(dx,dy,cw,ch);
  });
}

async function loadLevel(levelIdx,useCustom){
  S.solved=false; successEl.classList.remove('show');
  S.level=levelIdx; S.isCustom=!!useCustom;
  lvlTxt.textContent=useCustom?'自定义关卡':`第 ${levelIdx+1} 关`;
  loadTip.classList.add('show');
  try{
    S.img = useCustom?S.customImg:await loadImg(LEVELS[levelIdx]);
    loadTip.classList.remove('show'); bShow.classList.remove('gone');
    S.gridN=parseInt(sDiff.value); S.pieces=makePieces(S.gridN);
    resize(); render();
  }catch(e){ loadTip.textContent='加载失败'; }
}

function checkWin(){
  if(S.pieces.every(p=>p.locked)){
    S.solved=true; successEl.classList.add('show'); render();
    S.autoTimer=setTimeout(()=>goNext(),3000);
  }
}

// 交互事件省略（同前，确保逻辑闭环）...
gc.onmousedown = (e) => { /* 拖拽逻辑保持原样 */ }; 
// 为了简洁，其余事件绑定略，您可以直接在原代码基础上替换 goNext 函数。

bNext.onclick = ()=>goNext();
bPrev.onclick = ()=>goPrev();
bStart.onclick = ()=>loadLevel(S.level, false);
window.onresize = ()=>{resize();render()};

loadLevel(0,false);
})();
</script>
</body>
</html>
